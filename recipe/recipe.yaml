schema_version: 1

context:
  version: "2.23"

package:
  name: "which"
  version: ${{ version }}

source:
  url: https://carlowood.github.io/which/which-${{ version }}.tar.gz
  sha256: a2c558226fc4d9e4ce331bd2fd3c3f17f955115d2c00e447618a4ef9978a2a73

build:
  number: 1
  skip: win

requirements:
  build:
    - ${{ stdlib("c") }}
    - ${{ compiler("cxx") }}
    - make
    - pkg-config
    - gnuconfig

tests:
  - package_contents:
      strict: true
      bin:
        - which
      files:
        - etc/conda/activate.d/*
        - etc/conda/deactivate.d/*
        - share/info/which.info
        - share/man/man1/which.1

  - script:
      - which which

about:
  license: GPL-3.0-only
  license_file: COPYING
  summary: Shows the full path of (shell) commands
  description: |
    Which takes one or more arguments. For each of its arguments it prints
    to stdout the full path of the executables that would have been executed
    when this argument had been entered at the shell prompt. It does this by
    searching for an executable or script in the directories listed in the
    environment variable PATH using the same algorithm as bash(1).
  homepage: https://carlowood.github.io/which/
  documentation: https://carlowood.github.io/which/
  repository: https://cgit.git.savannah.gnu.org/cgit/which.git

extra:
  recipe-maintainers:
    - drbixx
    - teake
